name: Daily Data Ingestion Scheduler

on:
  schedule:
    # 10:30 AM IST is 05:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  ingest_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ingestion pipeline
      env:
        # Using environment variables from secrets. Add more if needed.
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python -m ingestion.ingest

    - name: Commit and push updated vector store
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/faiss_index/
        
        # Check if there are changes before committing
        if git diff --staged --quiet; then
          echo "No changes in vector store. Skipping commit."
        else
          git commit -m "chore: update vector store via daily ingestion"
          git push
        fi
